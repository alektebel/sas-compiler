<title>Esquema SAS — regllm</title>
<style>
:root {
  color-scheme: light;
  --bg: #f7f8f9;
  --surface: #fdfdfd;
  --surface-2: #f0f2f4;
  --ink: #131519;
  --ink-2: #4d5560;
  --ink-3: #848b96;
  --line: #e2e5e9;
  --line-2: #ccd1d7;
  --accent: #2a78d6;
  --accent-ink: #ffffff;
  --accent-wash: rgba(42, 120, 214, 0.10);
  --role-source: #4a3aa7;
  --role-seed: #1baf7a;
  --role-derived: #2a78d6;
  --role-final: #eb6834;
  --kind-input: #008300;
  --kind-modified: #b97e00;
  --kind-computed: #2a78d6;
  --mono: ui-monospace, "SF Mono", SFMono-Regular, Menlo, Consolas, "Liberation Mono", monospace;
  --sans: system-ui, -apple-system, "Segoe UI", sans-serif;
  --shadow: 0 1px 3px rgba(15, 20, 30, 0.07);
}
@media (prefers-color-scheme: dark) {
  :root:where(:not([data-theme="light"])) {
    color-scheme: dark;
    --bg: #121417;
    --surface: #1a1d21;
    --surface-2: #22262b;
    --ink: #eceef1;
    --ink-2: #aab2bc;
    --ink-3: #78808b;
    --line: #2b3036;
    --line-2: #3a4048;
    --accent: #3987e5;
    --accent-ink: #ffffff;
    --accent-wash: rgba(57, 135, 229, 0.16);
    --role-source: #9085e9;
    --role-seed: #199e70;
    --role-derived: #3987e5;
    --role-final: #d95926;
    --kind-input: #35a935;
    --kind-modified: #c98500;
    --kind-computed: #3987e5;
    --shadow: 0 1px 3px rgba(0, 0, 0, 0.35);
  }
}
:root[data-theme="dark"] {
  color-scheme: dark;
  --bg: #121417;
  --surface: #1a1d21;
  --surface-2: #22262b;
  --ink: #eceef1;
  --ink-2: #aab2bc;
  --ink-3: #78808b;
  --line: #2b3036;
  --line-2: #3a4048;
  --accent: #3987e5;
  --accent-ink: #ffffff;
  --accent-wash: rgba(57, 135, 229, 0.16);
  --role-source: #9085e9;
  --role-seed: #199e70;
  --role-derived: #3987e5;
  --role-final: #d95926;
  --kind-input: #35a935;
  --kind-modified: #c98500;
  --kind-computed: #3987e5;
  --shadow: 0 1px 3px rgba(0, 0, 0, 0.35);
}
:root[data-theme="light"] {
  color-scheme: light;
  --bg: #f7f8f9;
  --surface: #fdfdfd;
  --surface-2: #f0f2f4;
  --ink: #131519;
  --ink-2: #4d5560;
  --ink-3: #848b96;
  --line: #e2e5e9;
  --line-2: #ccd1d7;
  --accent: #2a78d6;
  --accent-ink: #ffffff;
  --accent-wash: rgba(42, 120, 214, 0.10);
  --role-source: #4a3aa7;
  --role-seed: #1baf7a;
  --role-derived: #2a78d6;
  --role-final: #eb6834;
  --kind-input: #008300;
  --kind-modified: #b97e00;
  --kind-computed: #2a78d6;
  --shadow: 0 1px 3px rgba(15, 20, 30, 0.07);
}

* { box-sizing: border-box; }
body {
  margin: 0;
  background: var(--bg);
  color: var(--ink);
  font: 14px/1.55 var(--sans);
}
button { font: inherit; color: inherit; }
:focus-visible { outline: 2px solid var(--accent); outline-offset: 2px; border-radius: 4px; }

/* ── Header ─────────────────────────────────────────── */
header {
  display: flex;
  flex-wrap: wrap;
  align-items: center;
  gap: 10px 18px;
  padding: 14px 22px;
  border-bottom: 1px solid var(--line);
  background: var(--surface);
}
.brand { display: flex; flex-direction: column; margin-right: auto; }
.brand h1 { margin: 0; font-size: 17px; font-weight: 700; letter-spacing: -0.01em; }
.brand p { margin: 0; font-size: 12px; color: var(--ink-3); }
.brand p code { font-family: var(--mono); font-size: 11px; }

.stats { display: flex; gap: 8px; }
.stat {
  display: flex; flex-direction: column; align-items: flex-end;
  padding: 4px 12px;
  border-left: 1px solid var(--line);
}
.stat b { font-size: 17px; font-weight: 700; line-height: 1.2; font-variant-numeric: tabular-nums; }
.stat span { font-size: 10.5px; text-transform: uppercase; letter-spacing: 0.06em; color: var(--ink-3); }

#btn-download {
  display: inline-flex; align-items: center; gap: 7px;
  padding: 8px 14px;
  border: none; border-radius: 7px;
  background: var(--accent); color: var(--accent-ink);
  font-weight: 600; font-size: 13px;
  cursor: pointer;
}
#btn-download:hover { filter: brightness(1.08); }
#btn-download svg { display: block; }

/* ── Pipeline bar ───────────────────────────────────── */
.pipebar {
  display: flex; flex-wrap: wrap; align-items: center; gap: 6px;
  padding: 10px 22px;
  border-bottom: 1px solid var(--line);
  background: var(--surface);
}
.pipebar .lbl {
  font-size: 10.5px; text-transform: uppercase; letter-spacing: 0.08em;
  color: var(--ink-3); margin-right: 6px;
}
.pipe-btn {
  padding: 6px 12px;
  border: 1px solid var(--line-2); border-radius: 18px;
  background: transparent; cursor: pointer;
  font-size: 12.5px; color: var(--ink-2);
}
.pipe-btn:hover { background: var(--surface-2); }
.pipe-btn.on {
  background: var(--accent-wash); border-color: var(--accent);
  color: var(--ink); font-weight: 600;
}
.pipe-desc { flex-basis: 100%; font-size: 12px; color: var(--ink-3); margin: 0; }

/* ── Shell ──────────────────────────────────────────── */
.shell { display: flex; min-height: calc(100vh - 130px); }

/* ── Sidebar ────────────────────────────────────────── */
aside {
  width: 292px; flex-shrink: 0;
  border-right: 1px solid var(--line);
  background: var(--surface);
  padding: 14px;
  display: flex; flex-direction: column; gap: 10px;
}
#search {
  width: 100%;
  padding: 7px 11px;
  border: 1px solid var(--line-2); border-radius: 7px;
  background: var(--bg); color: var(--ink);
  font: 12.5px var(--mono);
}
#search::placeholder { color: var(--ink-3); font-family: var(--sans); }
.tlist { display: flex; flex-direction: column; gap: 4px; overflow-y: auto; }
.trow {
  display: flex; align-items: center; gap: 9px;
  width: 100%; text-align: left;
  padding: 7px 9px;
  border: 1px solid transparent; border-radius: 7px;
  background: transparent; cursor: pointer;
}
.trow:hover { background: var(--surface-2); }
.trow.on { background: var(--accent-wash); border-color: var(--accent); }
.trow .dot { width: 9px; height: 9px; border-radius: 3px; flex-shrink: 0; }
.trow .nm {
  font-family: var(--mono); font-size: 12px; font-weight: 600;
  overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
}
.trow .lib { font-size: 10.5px; color: var(--ink-3); }
.trow .cnt {
  margin-left: auto; flex-shrink: 0;
  font-size: 11px; color: var(--ink-2);
  font-variant-numeric: tabular-nums;
  background: var(--surface-2); border-radius: 9px; padding: 1px 7px;
}
.legend { display: flex; flex-wrap: wrap; gap: 5px 12px; padding-top: 6px; border-top: 1px solid var(--line); }
.legend span { display: inline-flex; align-items: center; gap: 5px; font-size: 11px; color: var(--ink-2); }
.legend .dot { width: 8px; height: 8px; border-radius: 3px; }

/* ── Main ───────────────────────────────────────────── */
main { flex: 1; min-width: 0; padding: 18px 22px 40px; }
.tabs { display: flex; gap: 2px; border-bottom: 1px solid var(--line); margin-bottom: 18px; }
.tab {
  padding: 8px 16px 9px;
  border: none; border-bottom: 2px solid transparent;
  background: transparent; cursor: pointer;
  font-size: 13.5px; color: var(--ink-2);
}
.tab:hover { color: var(--ink); }
.tab.on { color: var(--ink); font-weight: 600; border-bottom-color: var(--accent); }

/* ── Table detail ───────────────────────────────────── */
.thead { display: flex; flex-wrap: wrap; align-items: baseline; gap: 8px 14px; margin-bottom: 4px; }
.thead h2 { margin: 0; font-family: var(--mono); font-size: 21px; letter-spacing: -0.01em; }
.chip {
  display: inline-flex; align-items: center; gap: 5px;
  padding: 2px 10px; border-radius: 11px;
  font-size: 11px; font-weight: 600; letter-spacing: 0.03em;
  color: #fff;
}
.meta { font-size: 12.5px; color: var(--ink-2); margin: 0 0 14px; }
.meta code { font-family: var(--mono); font-size: 11.5px; background: var(--surface-2); padding: 1px 6px; border-radius: 4px; }

.iogrid { display: grid; grid-template-columns: repeat(auto-fit, minmax(230px, 1fr)); gap: 12px; margin-bottom: 16px; }
.iocard {
  background: var(--surface); border: 1px solid var(--line); border-radius: 9px;
  padding: 11px 13px; box-shadow: var(--shadow);
}
.iocard h3 {
  margin: 0 0 7px; font-size: 10.5px; font-weight: 600;
  text-transform: uppercase; letter-spacing: 0.08em; color: var(--ink-3);
}
.iocard .none { font-size: 12.5px; color: var(--ink-3); font-style: italic; }
.tbtn {
  display: inline-flex; align-items: center; gap: 6px;
  margin: 2px 4px 2px 0;
  padding: 3px 9px;
  border: 1px solid var(--line-2); border-radius: 6px;
  background: var(--bg); cursor: pointer;
  font-family: var(--mono); font-size: 11.5px;
}
.tbtn:hover { border-color: var(--accent); background: var(--accent-wash); }
.tbtn .dot { width: 7px; height: 7px; border-radius: 2px; }
.cond { font-family: var(--mono); font-size: 11.5px; color: var(--ink-2); display: block; padding: 2px 0; }

.fieldwrap { background: var(--surface); border: 1px solid var(--line); border-radius: 9px; box-shadow: var(--shadow); overflow-x: auto; }
table.fields { width: 100%; border-collapse: collapse; min-width: 560px; }
table.fields th {
  text-align: left; padding: 8px 14px;
  font-size: 10.5px; text-transform: uppercase; letter-spacing: 0.07em;
  color: var(--ink-3); border-bottom: 1px solid var(--line);
  position: sticky; top: 0; background: var(--surface);
}
table.fields td { padding: 6px 14px; border-bottom: 1px solid var(--line); vertical-align: top; }
table.fields tr:last-child td { border-bottom: none; }
table.fields tr:hover td { background: var(--surface-2); }
td.fname { font-family: var(--mono); font-size: 12px; font-weight: 600; white-space: nowrap; }
td.fname .flink { cursor: pointer; border: none; background: none; padding: 0; font: inherit; color: var(--accent); }
td.fname .flink:hover { text-decoration: underline; }
.okind {
  display: inline-block; padding: 1px 8px; border-radius: 9px;
  font-size: 10.5px; font-weight: 600; color: #fff; white-space: nowrap;
}
td.fexpr { font-family: var(--mono); font-size: 11.5px; color: var(--ink-2); word-break: break-word; }

/* ── Graphs ─────────────────────────────────────────── */
.gwrap {
  background: var(--surface); border: 1px solid var(--line); border-radius: 9px;
  box-shadow: var(--shadow); overflow-x: auto; padding: 8px;
}
.gwrap svg { display: block; }
.gnode { cursor: pointer; }
.gnode rect { fill: var(--bg); stroke: var(--line-2); stroke-width: 1; rx: 8; }
.gnode:hover rect, .gnode.on rect { stroke: var(--accent); stroke-width: 1.6; }
.gnode text { fill: var(--ink); font-family: var(--mono); font-size: 11.5px; font-weight: 600; }
.gnode text.sub { fill: var(--ink-3); font-family: var(--sans); font-weight: 400; font-size: 10px; }
.gedge { fill: none; stroke: var(--line-2); stroke-width: 1.6; }
.gedge.hl { stroke: var(--accent); stroke-width: 2.2; }
.gelbl { fill: var(--ink-3); font-size: 9.5px; font-family: var(--sans); }
.fnode rect { fill: var(--bg); stroke-width: 1.2; rx: 7; }
.fnode text { font-family: var(--mono); font-size: 11px; font-weight: 600; fill: var(--ink); }
.fnode { cursor: pointer; }
.fnode:hover rect { stroke-width: 2; }

.fieldbar { display: flex; flex-wrap: wrap; align-items: center; gap: 10px; margin-bottom: 14px; }
.fieldbar label { font-size: 12.5px; color: var(--ink-2); }
#field-select, #dir-select {
  padding: 6px 10px; border: 1px solid var(--line-2); border-radius: 7px;
  background: var(--surface); color: var(--ink);
  font: 12.5px var(--mono);
}
#dir-select { font-family: var(--sans); }
.klegend { display: flex; gap: 14px; margin-left: auto; }
.klegend span { display: inline-flex; align-items: center; gap: 5px; font-size: 11.5px; color: var(--ink-2); }
.klegend .dot { width: 8px; height: 8px; border-radius: 3px; }

.predlist { margin-top: 16px; }
.predlist h3 { font-size: 13px; margin: 0 0 8px; }
.pred {
  display: flex; flex-wrap: wrap; align-items: baseline; gap: 8px;
  padding: 7px 12px; border-bottom: 1px solid var(--line);
  font-size: 12.5px;
}
.pred:last-child { border-bottom: none; }
.pred code { font-family: var(--mono); font-size: 11.5px; }
.pred .arrow { color: var(--ink-3); }
.pred .step { margin-left: auto; font-size: 11px; color: var(--ink-3); font-family: var(--mono); }

#tooltip {
  position: fixed; z-index: 10; pointer-events: none;
  max-width: 340px;
  background: var(--ink); color: var(--bg);
  border-radius: 7px; padding: 7px 11px;
  font: 11.5px var(--mono);
  box-shadow: 0 4px 14px rgba(0,0,0,0.25);
  opacity: 0; transition: opacity 0.1s;
}
@media (prefers-reduced-motion: reduce) { #tooltip { transition: none; } }
#tooltip.show { opacity: 1; }
#tooltip .tt-head { font-family: var(--sans); font-weight: 600; font-size: 11px; opacity: 0.75; }

.empty { color: var(--ink-3); font-style: italic; padding: 30px 0; text-align: center; }

@media (max-width: 760px) {
  .shell { flex-direction: column; }
  aside { width: 100%; border-right: none; border-bottom: 1px solid var(--line); }
  .tlist { max-height: 240px; }
  .stats { display: none; }
}
</style>

<header>
  <div class="brand">
    <h1>Explorador de esquemas SAS</h1>
    <p>tablas y linaje de campos extraídos con el compilador <code>src/sas_logic_tree.py</code> · alektebel/regllm</p>
  </div>
  <div class="stats" id="stats"></div>
  <button id="btn-download" type="button" title="Descargar informe de tablas y campos en texto plano">
    <svg width="14" height="14" viewBox="0 0 14 14" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
      <path d="M7 1.5v7.5M4 6.5 7 9.5l3-3M2 12.5h10"/>
    </svg>
    Descargar .txt
  </button>
</header>

<div class="pipebar" id="pipebar">
  <span class="lbl">Pipeline</span>
</div>

<div class="shell">
  <aside>
    <input id="search" type="search" placeholder="Filtrar tablas o campos…" autocomplete="off">
    <div class="tlist" id="tlist"></div>
    <div class="legend" id="role-legend"></div>
  </aside>

  <main>
    <div class="tabs" role="tablist">
      <button class="tab on" data-view="tabla" role="tab">Tabla</button>
      <button class="tab" data-view="flujo" role="tab">Flujo de tablas</button>
      <button class="tab" data-view="campos" role="tab">Linaje de campos</button>
    </div>
    <section id="view-tabla"></section>
    <section id="view-flujo" hidden></section>
    <section id="view-campos" hidden></section>
  </main>
</div>

<div id="tooltip"></div>

<script id="schema-data" type="application/json">__SCHEMA_JSON__</script>
<script>
"use strict";
const DATA = JSON.parse(document.getElementById("schema-data").textContent);

const ROLES = {
  source:  { label: "Fuente externa", css: "var(--role-source)" },
  seed:    { label: "Semilla (DATALINES)", css: "var(--role-seed)" },
  derived: { label: "Derivada", css: "var(--role-derived)" },
  final:   { label: "Final", css: "var(--role-final)" },
};
const KINDS = {
  input:    { label: "Campo fuente", css: "var(--kind-input)" },
  modified: { label: "Modificado", css: "var(--kind-modified)" },
  computed: { label: "Calculado", css: "var(--kind-computed)" },
};

const state = { pipe: DATA.pipelines[0].id, table: null, view: "tabla", field: null, dir: "up", search: "" };

const $  = (s, el) => (el || document).querySelector(s);
const $$ = (s, el) => Array.from((el || document).querySelectorAll(s));
const esc = (s) => String(s).replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;").replace(/"/g, "&quot;");

function pipe() { return DATA.pipelines.find((p) => p.id === state.pipe); }
function tableByName(n) { return pipe().tables.find((t) => t.name === n); }
function consumersOf(name) { return pipe().tables.filter((t) => t.inputs.includes(name)).map((t) => t.name); }

/* Dedupe new_fields per var, keeping every distinct formula */
function formulasByVar(t) {
  const m = new Map();
  for (const a of t.new_fields) {
    if (!m.has(a.var)) m.set(a.var, []);
    if (!m.get(a.var).includes(a.expr)) m.get(a.var).push(a.expr);
  }
  return m;
}

/* ── Header stats ──────────────────────────────────── */
function renderStats() {
  const nT = DATA.pipelines.reduce((s, p) => s + p.tables.length, 0);
  const fields = new Set();
  DATA.pipelines.forEach((p) => p.tables.forEach((t) => t.fields.forEach((f) => fields.add(f))));
  const nE = DATA.pipelines.reduce((s, p) => s + p.field_edges.length, 0);
  $("#stats").innerHTML = [
    [DATA.pipelines.length, "pipelines"],
    [nT, "tablas"],
    [fields.size, "campos"],
    [nE, "relaciones"],
  ].map(([v, l]) => `<div class="stat"><b>${v}</b><span>${l}</span></div>`).join("");
}

/* ── Pipeline bar ──────────────────────────────────── */
function renderPipebar() {
  const bar = $("#pipebar");
  $$(".pipe-btn, .pipe-desc", bar).forEach((el) => el.remove());
  for (const p of DATA.pipelines) {
    const b = document.createElement("button");
    b.type = "button";
    b.className = "pipe-btn" + (p.id === state.pipe ? " on" : "");
    b.textContent = `${p.name} · ${p.tables.length}`;
    b.onclick = () => { state.pipe = p.id; state.table = null; state.field = null; renderAll(); };
    bar.appendChild(b);
  }
  const d = document.createElement("p");
  d.className = "pipe-desc";
  d.textContent = pipe().description + "  —  " + pipe().files.join(" · ");
  bar.appendChild(d);
}

/* ── Sidebar ───────────────────────────────────────── */
function renderSidebar() {
  const q = state.search.trim().toUpperCase();
  const rows = pipe().tables.filter((t) =>
    !q || t.name.includes(q) || t.fields.some((f) => f.includes(q))
  );
  $("#tlist").innerHTML = rows.map((t) => {
    const [lib, base] = t.name.includes(".") ? t.name.split(".") : ["", t.name];
    return `<button type="button" class="trow${t.name === state.table ? " on" : ""}" data-t="${esc(t.name)}">
      <span class="dot" style="background:${ROLES[t.role].css}"></span>
      <span class="nm">${esc(base)}<br><span class="lib">${esc(lib || "—")}</span></span>
      <span class="cnt">${t.fields.length}</span>
    </button>`;
  }).join("") || `<div class="empty">Sin resultados</div>`;
  $$(".trow").forEach((b) => (b.onclick = () => { selectTable(b.dataset.t); }));

  $("#role-legend").innerHTML = Object.values(ROLES)
    .map((r) => `<span><span class="dot" style="background:${r.css}"></span>${r.label}</span>`).join("");
}

function selectTable(name) {
  state.table = name;
  setView("tabla");
  renderSidebar();
  renderTable();
}

/* ── Tabs ──────────────────────────────────────────── */
function setView(v) {
  state.view = v;
  $$(".tab").forEach((t) => t.classList.toggle("on", t.dataset.view === v));
  ["tabla", "flujo", "campos"].forEach((k) => ($("#view-" + k).hidden = k !== v));
  if (v === "flujo") renderFlow();
  if (v === "campos") renderFields();
}
$$(".tab").forEach((t) => (t.onclick = () => setView(t.dataset.view)));

/* ── View: table detail ────────────────────────────── */
function renderTable() {
  const el = $("#view-tabla");
  const t = state.table ? tableByName(state.table) : pipe().tables[pipe().tables.length - 1];
  if (!t) { el.innerHTML = `<div class="empty">Selecciona una tabla</div>`; return; }
  state.table = t.name;

  const role = ROLES[t.role];
  const consumers = consumersOf(t.name);
  const fmap = formulasByVar(t);
  const inherited = new Set(t.fields.filter((f) => !fmap.has(f)));

  const src = t.inputs.length
    ? t.inputs.map((n) => tbtn(n)).join("")
    : `<span class="none">${t.role === "seed" ? `DATALINES embebidos (${t.n_datalines} filas)` : "externa al pipeline"}</span>`;
  const cons = consumers.length ? consumers.map((n) => tbtn(n)).join("") : `<span class="none">ninguna — tabla terminal</span>`;
  const filt = t.filters.length || t.by_keys.length
    ? t.filters.map((f) => `<span class="cond">WHERE ${esc(f.condition)}</span>`).join("") +
      (t.by_keys.length ? `<span class="cond">BY ${esc(t.by_keys.join(", "))}</span>` : "")
    : `<span class="none">sin filtros ni claves BY</span>`;

  const rows = t.fields.map((f) => {
    const isNew = fmap.has(f);
    const kindKey = isNew ? "computed" : (t.role === "source" || t.role === "seed" ? "input" : "modified");
    const kind = isNew ? { label: "nuevo aquí", css: "var(--kind-computed)" }
      : (t.role === "source" || t.role === "seed")
        ? { label: "de origen", css: "var(--kind-input)" }
        : { label: "heredado", css: "var(--kind-modified)" };
    const exprs = isNew ? fmap.get(f).map((e) => esc(e)).join("<br>") : "";
    const inGraph = pipe().field_nodes.some((n) => n.id === f);
    const nameCell = inGraph
      ? `<button type="button" class="flink" data-f="${esc(f)}" title="Ver linaje de ${esc(f)}">${esc(f)}</button>`
      : esc(f);
    return `<tr><td class="fname">${nameCell}</td>
      <td><span class="okind" style="background:${kind.css}">${kind.label}</span></td>
      <td class="fexpr">${exprs || `<span style="color:var(--ink-3)">—</span>`}</td></tr>`;
  }).join("");

  el.innerHTML = `
    <div class="thead">
      <h2>${esc(t.name)}</h2>
      <span class="chip" style="background:${role.css}">${role.label}</span>
    </div>
    <p class="meta">${t.defined_in ? `Definida en <code>${esc(t.defined_in)}</code> · paso <code>${esc(t.join || "")}</code>` : "No definida en este pipeline — llega desde fuera (librería externa)."}
      · ${t.fields.length} campos, ${fmap.size} creados aquí</p>
    <div class="iogrid">
      <div class="iocard"><h3>Entradas (lee de)</h3>${src}</div>
      <div class="iocard"><h3>Salidas (alimenta a)</h3>${cons}</div>
      <div class="iocard"><h3>Filtros y claves</h3>${filt}</div>
    </div>
    <div class="fieldwrap">
      <table class="fields">
        <thead><tr><th>Campo</th><th>Origen</th><th>Fórmula / expresión</th></tr></thead>
        <tbody>${rows}</tbody>
      </table>
    </div>`;

  $$(".tbtn", el).forEach((b) => (b.onclick = () => selectTable(b.dataset.t)));
  $$(".flink", el).forEach((b) => (b.onclick = () => { state.field = b.dataset.f; setView("campos"); }));
}

function tbtn(name) {
  const t = tableByName(name);
  const css = t ? ROLES[t.role].css : "var(--ink-3)";
  return `<button type="button" class="tbtn" data-t="${esc(name)}"><span class="dot" style="background:${css}"></span>${esc(name)}</button>`;
}

/* ── View: table flow DAG ──────────────────────────── */
function tableLayers() {
  const tabs = pipe().tables;
  const memo = new Map();
  const depth = (name, stack) => {
    if (memo.has(name)) return memo.get(name);
    if (stack.has(name)) return 0;
    const t = tabs.find((x) => x.name === name);
    if (!t || !t.inputs.length) { memo.set(name, 0); return 0; }
    stack.add(name);
    const d = 1 + Math.max(...t.inputs.map((i) => depth(i, stack)));
    stack.delete(name);
    memo.set(name, d);
    return d;
  };
  const layers = [];
  for (const t of tabs) {
    const d = depth(t.name, new Set());
    (layers[d] = layers[d] || []).push(t);
  }
  return layers.filter(Boolean);
}

function renderFlow() {
  const el = $("#view-flujo");
  const layers = tableLayers();
  const NW = 196, NH = 46, GX = 96, GY = 26, PAD = 18;
  const H = Math.max(...layers.map((l) => l.length)) * (NH + GY) - GY + PAD * 2;
  const W = layers.length * (NW + GX) - GX + PAD * 2;

  const pos = new Map();
  layers.forEach((layer, li) => {
    const colH = layer.length * (NH + GY) - GY;
    layer.forEach((t, i) => {
      pos.set(t.name, { x: PAD + li * (NW + GX), y: PAD + (H - PAD * 2 - colH) / 2 + i * (NH + GY) });
    });
  });

  let edges = "", labels = "";
  for (const e of pipe().table_edges) {
    const a = pos.get(e.source), b = pos.get(e.target);
    if (!a || !b) continue;
    const x1 = a.x + NW, y1 = a.y + NH / 2, x2 = b.x, y2 = b.y + NH / 2;
    const mx = (x1 + x2) / 2;
    edges += `<path class="gedge" data-s="${esc(e.source)}" data-t="${esc(e.target)}" d="M${x1},${y1} C${mx},${y1} ${mx},${y2} ${x2},${y2}" marker-end="url(#arr)"/>`;
    labels += `<text class="gelbl" x="${mx}" y="${(y1 + y2) / 2 - 5}" text-anchor="middle">${esc(e.kind || "")}</text>`;
  }

  let nodes = "";
  for (const [name, p] of pos) {
    const t = tableByName(name);
    const [lib, base] = name.includes(".") ? name.split(".") : ["", name];
    nodes += `<g class="gnode${name === state.table ? " on" : ""}" data-t="${esc(name)}" tabindex="0" role="button" aria-label="${esc(name)}">
      <rect x="${p.x}" y="${p.y}" width="${NW}" height="${NH}" rx="8"/>
      <rect x="${p.x}" y="${p.y + 6}" width="4" height="${NH - 12}" rx="2" fill="${ROLES[t.role].css}" stroke="none"/>
      <text x="${p.x + 14}" y="${p.y + 20}">${esc(base.length > 24 ? base.slice(0, 23) + "…" : base)}</text>
      <text class="sub" x="${p.x + 14}" y="${p.y + 35}">${esc(lib || "")} · ${t.fields.length} campos</text>
    </g>`;
  }

  el.innerHTML = `
    <p class="meta">Flujo de datos entre tablas — pulsa un nodo para abrir su detalle. La franja de color indica el rol.</p>
    <div class="gwrap"><svg viewBox="0 0 ${W} ${H}" width="${W}" height="${H}" role="img" aria-label="Grafo de dependencias entre tablas">
      <defs><marker id="arr" viewBox="0 0 8 8" refX="7" refY="4" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
        <path d="M0,0.5 L7.5,4 L0,7.5 z" fill="var(--line-2)"/>
      </marker></defs>
      ${edges}${labels}${nodes}
    </svg></div>`;

  $$(".gnode", el).forEach((g) => {
    const open = () => selectTable(g.dataset.t);
    g.onclick = open;
    g.onkeydown = (ev) => { if (ev.key === "Enter" || ev.key === " ") { ev.preventDefault(); open(); } };
    g.onmouseenter = () => $$(".gedge", el).forEach((p) =>
      p.classList.toggle("hl", p.dataset.s === g.dataset.t || p.dataset.t === g.dataset.t));
    g.onmouseleave = () => $$(".gedge", el).forEach((p) => p.classList.remove("hl"));
  });
}

/* ── View: field lineage ───────────────────────────── */
function fieldGraph(target, up) {
  const edges = pipe().field_edges;
  const adj = new Map();
  for (const e of edges) {
    const key = up ? e.target : e.source;
    if (!adj.has(key)) adj.set(key, []);
    adj.get(key).push(e);
  }
  const depth = new Map([[target, 0]]);
  const keepEdges = [];
  let frontier = [target];
  while (frontier.length) {
    const next = [];
    for (const n of frontier) {
      for (const e of adj.get(n) || []) {
        keepEdges.push(e);
        const other = up ? e.source : e.target;
        if (!depth.has(other)) { depth.set(other, depth.get(n) + 1); next.push(other); }
      }
    }
    frontier = next;
  }
  return { depth, edges: keepEdges };
}

function renderFields() {
  const el = $("#view-campos");
  const nodes = pipe().field_nodes;
  if (!nodes.length) { el.innerHTML = `<div class="empty">Este pipeline no tiene linaje de campos.</div>`; return; }
  if (!state.field || !nodes.some((n) => n.id === state.field)) {
    state.field = nodes.some((n) => n.id === "ECL") ? "ECL" : nodes[nodes.length - 1].id;
  }

  const opts = nodes.map((n) => `<option value="${esc(n.id)}"${n.id === state.field ? " selected" : ""}>${esc(n.id)}</option>`).join("");
  el.innerHTML = `
    <div class="fieldbar">
      <label for="field-select">Campo</label>
      <select id="field-select">${opts}</select>
      <select id="dir-select" aria-label="Dirección del linaje">
        <option value="up"${state.dir === "up" ? " selected" : ""}>⇦ ¿De dónde viene? (ancestros)</option>
        <option value="down"${state.dir === "down" ? " selected" : ""}>⇨ ¿A qué afecta? (descendientes)</option>
      </select>
      <div class="klegend">${Object.values(KINDS).map((k) =>
        `<span><span class="dot" style="background:${k.css}"></span>${k.label}</span>`).join("")}</div>
    </div>
    <div id="field-graph"></div>
    <div id="field-preds" class="predlist"></div>`;

  $("#field-select").onchange = (e) => { state.field = e.target.value; renderFields(); };
  $("#dir-select").onchange = (e) => { state.dir = e.target.value; renderFields(); };
  drawFieldGraph();
}

function drawFieldGraph() {
  const host = $("#field-graph");
  const up = state.dir === "up";
  const { depth, edges } = fieldGraph(state.field, up);
  const kindOf = new Map(pipe().field_nodes.map((n) => [n.id, n.kind]));

  if (depth.size === 1) {
    host.innerHTML = `<div class="empty">${esc(state.field)} no tiene ${up ? "ancestros" : "descendientes"} en este pipeline.</div>`;
    $("#field-preds").innerHTML = "";
    return;
  }

  const cols = [];
  for (const [f, d] of depth) (cols[d] = cols[d] || []).push(f);
  const NH = 30, GY = 14, GX = 74, PAD = 16;
  const charW = 7.2;
  const colW = cols.map((c) => Math.max(...c.map((f) => f.length)) * charW + 26);
  const colX = [];
  let acc = PAD;
  for (let i = 0; i < cols.length; i++) { colX[i] = acc; acc += colW[i] + GX; }
  const W = acc - GX + PAD;
  const H = Math.max(...cols.map((c) => c.length)) * (NH + GY) - GY + PAD * 2;

  const pos = new Map();
  cols.forEach((col, ci) => {
    col.sort();
    const colH = col.length * (NH + GY) - GY;
    col.forEach((f, i) => {
      // ancestors flow right→left toward the target; descendants left→right
      const x = up ? W - colX[ci] - colW[ci] : colX[ci];
      pos.set(f, { x, y: PAD + (H - PAD * 2 - colH) / 2 + i * (NH + GY), w: colW[ci] });
    });
  });

  let epaths = "";
  edges.forEach((e, i) => {
    const a = pos.get(e.source), b = pos.get(e.target);
    if (!a || !b) return;
    const x1 = a.x + a.w, y1 = a.y + NH / 2, x2 = b.x, y2 = b.y + NH / 2;
    const mx = (x1 + x2) / 2;
    epaths += `<path class="gedge" data-i="${i}" d="M${x1},${y1} C${mx},${y1} ${mx},${y2} ${x2},${y2}" marker-end="url(#arr2)"
      stroke-dasharray="${e.kind === "conditions" ? "4 3" : "none"}"/>`;
  });

  let gnodes = "";
  for (const [f, p] of pos) {
    const css = (KINDS[kindOf.get(f)] || KINDS.computed).css;
    gnodes += `<g class="fnode${f === state.field ? " on" : ""}" data-f="${esc(f)}" tabindex="0" role="button" aria-label="${esc(f)}">
      <rect x="${p.x}" y="${p.y}" width="${p.w}" height="${NH}" stroke="${css}" ${f === state.field ? `fill="var(--accent-wash)"` : ""}/>
      <text x="${p.x + 13}" y="${p.y + 19}">${esc(f)}</text>
    </g>`;
  }

  host.innerHTML = `
    <p class="meta">${up
      ? `Todos los campos que alimentan <code>${esc(state.field)}</code>, por capas de profundidad. Línea discontinua = influencia por condición (IF/WHERE).`
      : `Todos los campos afectados por <code>${esc(state.field)}</code>. Línea discontinua = influencia por condición (IF/WHERE).`}</p>
    <div class="gwrap"><svg viewBox="0 0 ${W} ${H}" width="${W}" height="${H}" role="img" aria-label="Grafo de linaje de campos">
      <defs><marker id="arr2" viewBox="0 0 8 8" refX="7" refY="4" markerWidth="6.5" markerHeight="6.5" orient="auto-start-reverse">
        <path d="M0,0.5 L7.5,4 L0,7.5 z" fill="var(--line-2)"/>
      </marker></defs>
      ${epaths}${gnodes}
    </svg></div>`;

  const tt = $("#tooltip");
  $$(".gedge", host).forEach((p) => {
    const e = edges[+p.dataset.i];
    p.addEventListener("mousemove", (ev) => {
      tt.innerHTML = `<div class="tt-head">${esc(e.source)} → ${esc(e.target)} · ${e.kind === "conditions" ? "condiciona" : "asigna"} · ${esc(e.data_step)}</div>${e.expr ? esc(e.expr) : ""}`;
      tt.style.left = Math.min(ev.clientX + 14, window.innerWidth - 360) + "px";
      tt.style.top = ev.clientY + 14 + "px";
      tt.classList.add("show");
      p.classList.add("hl");
    });
    p.addEventListener("mouseleave", () => { tt.classList.remove("show"); p.classList.remove("hl"); });
  });
  $$(".fnode", host).forEach((g) => {
    const open = () => { state.field = g.dataset.f; renderFields(); };
    g.onclick = open;
    g.onkeydown = (ev) => { if (ev.key === "Enter" || ev.key === " ") { ev.preventDefault(); open(); } };
  });

  const direct = edges.filter((e) => (up ? e.target : e.source) === state.field);
  $("#field-preds").innerHTML = direct.length ? `
    <h3>${up ? "Entradas directas" : "Salidas directas"} de ${esc(state.field)}</h3>
    <div class="fieldwrap">${direct.map((e) => `
      <div class="pred">
        <code>${esc(e.source)}</code><span class="arrow">→</span><code>${esc(e.target)}</code>
        ${e.expr ? `<code style="color:var(--ink-2)">= ${esc(e.expr)}</code>` : `<span style="color:var(--ink-3);font-size:11.5px">vía condición</span>`}
        <span class="step">${esc(e.data_step)}</span>
      </div>`).join("")}</div>` : "";
}

/* ── Download report ───────────────────────────────── */
function buildReport() {
  const L = [];
  const bar = "=".repeat(78);
  L.push(bar, "INVENTARIO DE TABLAS SAS — repositorio alektebel/regllm",
    "Extraído con el compilador SAS (src/sas_logic_tree.py)",
    "Generado: " + new Date().toISOString().slice(0, 10), bar, "");
  for (const p of DATA.pipelines) {
    L.push("", "#".repeat(78), `# PIPELINE: ${p.name} (${p.id})`, `# ${p.description}`,
      `# Ficheros: ${p.files.join(", ")}`, "#".repeat(78));
    for (const t of p.tables) {
      const fmap = new Map();
      for (const a of t.new_fields) { if (!fmap.has(a.var)) fmap.set(a.var, []); fmap.get(a.var).push(a.expr); }
      L.push("", `TABLA: ${t.name}`, `  rol: ${ROLES[t.role].label}`);
      if (t.defined_in) L.push(`  definida en: ${t.defined_in} (${t.join || ""})`);
      L.push(`  entradas: ${t.inputs.length ? t.inputs.join(", ") : "(externa / semilla)"}`);
      const cons = p.tables.filter((x) => x.inputs.includes(t.name)).map((x) => x.name);
      L.push(`  alimenta a: ${cons.length ? cons.join(", ") : "(terminal)"}`);
      if (t.by_keys.length) L.push(`  claves BY: ${t.by_keys.join(", ")}`);
      for (const f of t.filters) L.push(`  filtro: WHERE ${f.condition}`);
      L.push(`  campos (${t.fields.length}):`);
      for (const f of t.fields) {
        if (fmap.has(f)) L.push(`    ${f.padEnd(28)} [nuevo]  = ${fmap.get(f).join("  |  ")}`);
        else L.push(`    ${f}`);
      }
    }
    L.push("", `RELACIONES ENTRE CAMPOS (${p.field_edges.length}):`);
    for (const e of p.field_edges) {
      L.push(`  ${e.source} -> ${e.target}  [${e.kind === "conditions" ? "condiciona" : "asigna"}]  paso ${e.data_step}${e.expr ? "  expr: " + e.expr : ""}`);
    }
  }
  return L.join("\n") + "\n";
}

$("#btn-download").onclick = () => {
  const blob = new Blob([buildReport()], { type: "text/plain;charset=utf-8" });
  const a = document.createElement("a");
  a.href = URL.createObjectURL(blob);
  a.download = "tablas_sas_regllm.txt";
  document.body.appendChild(a);
  a.click();
  setTimeout(() => { URL.revokeObjectURL(a.href); a.remove(); }, 500);
};

$("#search").addEventListener("input", (e) => { state.search = e.target.value; renderSidebar(); });

function renderAll() {
  renderStats();
  renderPipebar();
  renderSidebar();
  renderTable();

}
renderAll();
